<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Mobile</title>
    <link rel="stylesheet" href="./CSS/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Sigmar&display=swap"
        rel="stylesheet">
</head>

<body>
    <!--
        Banner
    -->
    <header class="container-header">
        <img src="./imgs/banner.png" class="img-header" alt="Banner Discord">
    </header>
    <!--
        Sezione 1
    -->
    <main>
        <section class="section-1">
            <div class="small-logo">
                <img src="./imgs/discord_cube.png" class="discord-cube" alt="Cubo Discord">
            </div>
            <h2 class="title-section">
                GROUP CHAT THAT'S ALL FUN &amp; GAMES
            </h2>
            <p class="text-section">
                Use custom emoji, stickers, soundboard effects
                and more to add your personality to your voice,
                video, or text chat. Set your avatar and a custom
                status, and write your own profile to show up in
                chat your way.
            </p>
            <div class="container-img">
                <img src="./imgs/discord_demo.png" class="img-section" alt="Demo-discord">
            </div>
        </section>
    </main>
</body>

</html>
